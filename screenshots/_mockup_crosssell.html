<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=375">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; width: 375px; color: #222; }
  .cart-header { background: #1a1a2e; color: #fff; padding: 14px 16px; font-size: 15px; font-weight: 600; display: flex; justify-content: space-between; }
  .cart-item { padding: 14px 16px; border-bottom: 1px solid #eee; display: flex; gap: 12px; }
  .cart-item img { width: 80px; height: 80px; object-fit: contain; background: #f5f5f5; border-radius: 6px; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 12px; color: #333; line-height: 1.4; }
  .cart-item-price { font-size: 14px; font-weight: 700; margin-top: 6px; }
  .cart-item-qty { font-size: 12px; color: #666; margin-top: 4px; }
  .crosssell-section { padding: 16px; background: #f0faf9; border-top: 2px solid #00796b; }
  .crosssell-title { font-size: 14px; font-weight: 700; color: #00796b; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .crosssell-grid { display: flex; gap: 10px; overflow-x: auto; }
  .crosssell-card { min-width: 140px; background: #fff; border-radius: 8px; padding: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .crosssell-card-img { width: 100%; height: 80px; background: #f9f9f9; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .crosssell-card-name { font-size: 11px; color: #333; margin-top: 8px; line-height: 1.3; }
  .crosssell-card-price { font-size: 13px; font-weight: 700; margin-top: 4px; }
  .crosssell-card-btn { display: block; width: 100%; margin-top: 8px; padding: 6px; background: #00796b; color: #fff; border: none; border-radius: 4px; font-size: 11px; font-weight: 600; text-align: center; }
  .mockup-badge { position: fixed; top: 0; right: 0; background: #00796b; color: #fff; font-size: 9px; padding: 3px 8px; border-radius: 0 0 0 6px; font-weight: 600; }
</style></head><body>
<div class="mockup-badge">PROPOSED</div>
<div class="cart-header"><span>🛒 Your Cart (1)</span><span>✕</span></div>
<div class="cart-item">
  <div style="width:80px;height:80px;background:#f5f5f5;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:32px;">❄️</div>
  <div class="cart-item-info">
    <div class="cart-item-name">Voltas Vectra Emerald Split AC — 1.5 Ton, 3 Star Inverter</div>
    <div class="cart-item-price">₹35,990 <span style="font-size:11px;color:#888;font-weight:400;text-decoration:line-through;">₹42,990</span></div>
    <div class="cart-item-qty">Qty: 1</div>
  </div>
</div>

<div class="crosssell-section">
  <div class="crosssell-title">⚡ Complete Your Setup</div>
  <div class="crosssell-grid">
    <div class="crosssell-card">
      <div class="crosssell-card-img">🔌</div>
      <div class="crosssell-card-name">AC Voltage Stabilizer (1.5 Ton)</div>
      <div class="crosssell-card-price">₹2,490</div>
      <div class="crosssell-card-btn">+ Add to Cart</div>
    </div>
    <div class="crosssell-card">
      <div class="crosssell-card-img">🛡️</div>
      <div class="crosssell-card-name">Extended Warranty — 2 Extra Years</div>
      <div class="crosssell-card-price">₹1,999</div>
      <div class="crosssell-card-btn">+ Add to Cart</div>
    </div>
    <div class="crosssell-card">
      <div class="crosssell-card-img">🧹</div>
      <div class="crosssell-card-name">AC Cleaning Kit + Filters</div>
      <div class="crosssell-card-price">₹699</div>
      <div class="crosssell-card-btn">+ Add to Cart</div>
    </div>
  </div>
</div>
</body></html>
